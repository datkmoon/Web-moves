<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIFLIX</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cairo:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --gold:#E5B94E;--gold2:#c9952a;--dark:#090910;--card:#111118;
    --card2:#181824;--border:#252535;--text:#f0ede8;--muted:#777;--red:#e53935;
  }
  html,body{min-height:100%;background:var(--dark);color:var(--text);font-family:'Cairo',sans-serif}
  #app{max-width:960px;margin:0 auto;padding:2rem 1rem 4rem}

  .logo{font-family:'Bebas Neue',cursive;font-size:3.8rem;letter-spacing:6px;color:var(--gold);text-align:center;line-height:1}
  .tagline{text-align:center;color:var(--muted);font-size:0.75rem;letter-spacing:3px;margin-bottom:2rem;text-transform:uppercase}

  .search-wrap{display:flex;margin-bottom:1rem;border:1.5px solid var(--gold);border-radius:8px;overflow:hidden}
  #searchInput{flex:1;background:#0a0a14;border:none;color:var(--text);font-size:1rem;padding:0.85rem 1.2rem;font-family:'Cairo',sans-serif;outline:none}
  #searchInput::placeholder{color:#444}
  #searchBtn{background:var(--gold);border:none;color:#000;font-family:'Bebas Neue',cursive;font-size:1.2rem;letter-spacing:2px;padding:0 2rem;cursor:pointer;transition:background 0.2s}
  #searchBtn:hover{background:var(--gold2)}

  .filters{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
  .flt{background:var(--card2);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:0.3rem 1rem;font-size:0.82rem;cursor:pointer;transition:all 0.2s;font-family:'Cairo',sans-serif}
  .flt.active,.flt:hover{background:var(--gold);color:#000;border-color:var(--gold)}

  .results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:1rem}
  .card{background:var(--card);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;border:1.5px solid transparent;position:relative}
  .card:hover{transform:translateY(-5px);border-color:var(--gold);box-shadow:0 10px 40px rgba(229,185,78,0.18)}
  .card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
  .no-poster{width:100%;aspect-ratio:2/3;background:var(--card2);display:flex;align-items:center;justify-content:center;color:#333;font-size:2.5rem}
  .play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);transition:background 0.2s;opacity:0}
  .card:hover .play-overlay{background:rgba(0,0,0,0.55);opacity:1}
  .play-circle{width:52px;height:52px;background:rgba(229,185,78,0.92);border-radius:50%;display:flex;align-items:center;justify-content:center}
  .play-circle::after{content:'';border-left:20px solid #000;border-top:12px solid transparent;border-bottom:12px solid transparent;margin-left:5px}
  .card-info{padding:0.6rem 0.75rem 0.75rem}
  .card-title{font-size:0.83rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:3px}
  .card-year{font-size:0.72rem;color:var(--muted)}
  .badge{font-size:0.65rem;background:rgba(229,185,78,0.15);color:var(--gold);border:1px solid rgba(229,185,78,0.3);border-radius:4px;padding:1px 6px}

  .loading{text-align:center;padding:3rem;color:var(--muted)}
  .spinner{width:40px;height:40px;border:3px solid #333;border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 1rem}
  @keyframes spin{to{transform:rotate(360deg)}}
  .msg{text-align:center;padding:2.5rem;color:var(--muted);font-size:0.9rem;line-height:2}

  #pagination{display:flex;gap:0.5rem;justify-content:center;margin-top:1.8rem;flex-wrap:wrap}
  .page-btn{background:var(--card2);border:1px solid var(--border);color:var(--muted);padding:0.42rem 1rem;border-radius:6px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:0.85rem;transition:all 0.2s}
  .page-btn:hover,.page-btn.active{background:var(--gold);color:#000;border-color:var(--gold)}
  .page-btn:disabled{opacity:0.3;cursor:default;pointer-events:none}

  /* PLAYER */
  .player-overlay{position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column}
  .player-header{display:flex;align-items:center;justify-content:space-between;padding:0.7rem 1.2rem;background:#0a0a14;border-bottom:1px solid var(--border);gap:1rem;flex-shrink:0}
  .player-title{font-family:'Bebas Neue',cursive;font-size:1.5rem;letter-spacing:2px;color:var(--gold);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .player-close{background:none;border:1px solid #444;color:var(--text);width:36px;height:36px;border-radius:6px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;font-family:'Cairo',sans-serif}
  .player-close:hover{border-color:var(--red);color:var(--red)}
  .player-frame-wrap{flex:1;position:relative;background:#000}
  .player-frame-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
  .player-bottom{padding:0.7rem 1.2rem;background:#0a0a14;border-top:1px solid var(--border);display:flex;align-items:center;gap:0.8rem;flex-wrap:wrap;flex-shrink:0}
  .src-label{color:var(--muted);font-size:0.8rem;white-space:nowrap}
  .src-btns{display:flex;gap:0.4rem;flex-wrap:wrap}
  .src-btn{background:var(--card2);border:1px solid var(--border);color:var(--muted);padding:0.3rem 0.85rem;border-radius:6px;cursor:pointer;font-size:0.8rem;font-family:'Cairo',sans-serif;transition:all 0.2s}
  .src-btn.active,.src-btn:hover{background:var(--gold);color:#000;border-color:var(--gold)}
  .ep-ctrl{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap}
  .ep-label{color:var(--muted);font-size:0.8rem}
  .ep-in{width:52px;background:#0a0a14;border:1px solid var(--border);color:var(--text);padding:0.28rem 0.4rem;border-radius:5px;font-family:'Cairo',sans-serif;font-size:0.82rem;text-align:center;outline:none}
  .ep-in:focus{border-color:var(--gold)}
  .ep-go{background:var(--gold);color:#000;border:none;padding:0.3rem 0.9rem;border-radius:5px;cursor:pointer;font-size:0.8rem;font-family:'Cairo',sans-serif;font-weight:600}
  .imdb-btn{display:inline-flex;align-items:center;background:#f5c518;color:#000;padding:0.3rem 0.9rem;border-radius:5px;font-size:0.8rem;font-weight:700;font-family:'Cairo',sans-serif;text-decoration:none;margin-right:auto;white-space:nowrap}
  .imdb-btn:hover{background:#d4a800}
</style>
</head>
<body>
<div id="app">
  <div class="logo">AIFLIX</div>
  <div class="tagline">Search · Discover · Watch</div>

  <div class="search-wrap">
    <input id="searchInput" placeholder="ابحث عن فيلم او مسلسل... (بالانجليزي)" autocomplete="off">
    <button id="searchBtn">بحث</button>
  </div>

  <div class="filters">
    <button class="flt active" data-type="all">الكل</button>
    <button class="flt" data-type="movie">افلام</button>
    <button class="flt" data-type="series">مسلسلات</button>
  </div>

  <div id="results">
    <div class="msg">ابحث عن اي فيلم او مسلسل<br><small style="color:#555">مثال: Avengers &nbsp;/&nbsp; Breaking Bad &nbsp;/&nbsp; Inception</small></div>
  </div>
  <div id="pagination"></div>
</div>

<!-- PLAYER OVERLAY -->
<div id="playerOverlay" class="player-overlay" style="display:none">
  <div class="player-header">
    <span class="player-title" id="playerTitle">—</span>
    <button class="player-close" id="closePlayer">✕</button>
  </div>
  <div class="player-frame-wrap">
    <iframe id="playerFrame" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
  </div>
  <div class="player-bottom">
    <span class="src-label">المصدر:</span>
    <div class="src-btns" id="srcBtns"></div>
    <div class="ep-ctrl" id="epCtrl" style="display:none">
      <span class="ep-label">موسم</span>
      <input class="ep-in" id="sNum" type="number" min="1" value="1">
      <span class="ep-label">حلقة</span>
      <input class="ep-in" id="eNum" type="number" min="1" value="1">
      <button class="ep-go" id="epGo">تشغيل</button>
    </div>
    <a class="imdb-btn" id="imdbBtn" href="#" target="_blank" rel="noopener">⭐ IMDB</a>
  </div>
</div>

<script>
const MOVIE_SRC = {
  vidsrc:     id=>`https://vidsrc.to/embed/movie/${id}`,
  vidsrcme:   id=>`https://vidsrc.me/embed/movie?imdb=${id}`,
  embedsu:    id=>`https://embed.su/embed/movie/${id}`,
  superembed: id=>`https://multiembed.mov/?video_id=${id}&tmdb=0`
};
const TV_SRC = {
  vidsrc:     (id,s,e)=>`https://vidsrc.to/embed/tv/${id}/${s}/${e}`,
  vidsrcme:   (id,s,e)=>`https://vidsrc.me/embed/tv?imdb=${id}&season=${s}&episode=${e}`,
  embedsu:    (id,s,e)=>`https://embed.su/embed/tv/${id}/${s}/${e}`,
  superembed: (id,s,e)=>`https://multiembed.mov/?video_id=${id}&tmdb=0&s=${s}&e=${e}`
};
const SRC_NAMES = {vidsrc:'VidSrc',vidsrcme:'VidSrc.me',embedsu:'Embed.su',superembed:'SuperEmbed'};

let curType='all', curQuery='', curPage=1, totalRes=0, curItem=null, curSrc='vidsrc';
const $=id=>document.getElementById(id);

// All requests go through our own /api/omdb — no CORS ever
async function omdb(params){
  const r = await fetch('/api/omdb?'+params);
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

document.querySelectorAll('.flt').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.flt').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); curType=b.dataset.type;
    if(curQuery){curPage=1;search();}
  };
});

$('searchInput').onkeydown=e=>{if(e.key==='Enter'){curPage=1;search();}};
$('searchBtn').onclick=()=>{curPage=1;search();};

async function search(){
  curQuery=$('searchInput').value.trim();
  if(!curQuery)return;
  $('results').innerHTML='<div class="loading"><div class="spinner"></div>جاري البحث...</div>';
  $('pagination').innerHTML='';
  try{
    const tp=curType!=='all'?`&type=${curType}`:'';
    const data=await omdb(`s=${encodeURIComponent(curQuery)}&page=${curPage}${tp}`);
    if(data.Response==='False'){
      $('results').innerHTML=`<div class="msg">لا توجد نتائج لـ "${curQuery}"</div>`;return;
    }
    totalRes=parseInt(data.totalResults)||0;
    renderGrid(data.Search);
    renderPages();
  }catch(err){
    $('results').innerHTML=`<div class="msg">خطا في الاتصال<br><small style="color:#555">${err.message}</small></div>`;
  }
}

function renderGrid(items){
  if(!items?.length){$('results').innerHTML='<div class="msg">لا توجد نتائج</div>';return;}
  const g=document.createElement('div');g.className='results-grid';
  const tm={movie:'فيلم',series:'مسلسل',game:'لعبة'};
  items.forEach(it=>{
    const c=document.createElement('div');c.className='card';
    const hp=it.Poster&&it.Poster!=='N/A';
    c.innerHTML=(hp?`<img src="${it.Poster}" alt="" loading="lazy">`:`<div class="no-poster">🎬</div>`)+
      `<div class="play-overlay"><div class="play-circle"></div></div>`+
      `<div class="card-info"><div class="card-title" title="${it.Title}">${it.Title}</div>`+
      `<div class="card-meta"><span class="card-year">${it.Year}</span><span class="badge">${tm[it.Type]||it.Type}</span></div></div>`;
    c.onclick=()=>openPlayer(it);
    g.appendChild(c);
  });
  $('results').innerHTML='';$('results').appendChild(g);
}

function renderPages(){
  const total=Math.ceil(totalRes/10);
  const pg=$('pagination');pg.innerHTML='';if(total<=1)return;
  const mk=(label,page,active)=>{
    const b=document.createElement('button');
    b.className='page-btn'+(active?' active':'');b.textContent=label;
    b.onclick=()=>{curPage=page;search();window.scrollTo(0,0);};
    pg.appendChild(b);
  };
  if(curPage>1)mk('السابق',curPage-1,false);
  const s=Math.max(1,curPage-2),e=Math.min(total,curPage+2);
  for(let i=s;i<=e;i++)mk(i,i,i===curPage);
  if(curPage<total)mk('التالي',curPage+1,false);
}

function openPlayer(item){
  curItem=item;curSrc='vidsrc';
  $('playerTitle').textContent=`${item.Title} (${item.Year})`;
  $('imdbBtn').href=`https://www.imdb.com/title/${item.imdbID}/`;
  const sb=$('srcBtns');sb.innerHTML='';
  Object.keys(SRC_NAMES).forEach(k=>{
    const b=document.createElement('button');
    b.className='src-btn'+(k==='vidsrc'?' active':'');
    b.textContent=SRC_NAMES[k];
    b.onclick=()=>{curSrc=k;document.querySelectorAll('.src-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');loadFrame();};
    sb.appendChild(b);
  });
  const isTv=item.Type==='series';
  $('epCtrl').style.display=isTv?'flex':'none';
  if(isTv){$('sNum').value=1;$('eNum').value=1;}
  $('epGo').onclick=loadFrame;
  loadFrame();
  $('playerOverlay').style.display='flex';
  document.body.style.overflow='hidden';
}

function loadFrame(){
  const id=curItem.imdbID,isTv=curItem.Type==='series';
  $('playerFrame').src=isTv
    ?TV_SRC[curSrc](id,parseInt($('sNum').value)||1,parseInt($('eNum').value)||1)
    :MOVIE_SRC[curSrc](id);
}

$('closePlayer').onclick=()=>{
  $('playerOverlay').style.display='none';
  $('playerFrame').src='about:blank';
  document.body.style.overflow='';
};
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&$('playerOverlay').style.display!=='none')$('closePlayer').click();
});
</script>
</body>
</html>
